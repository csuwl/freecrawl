apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "freecrawl.fullname" . }}-redis
  labels:
    app: {{ include "freecrawl.name" . }}-redis
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "freecrawl.name" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "freecrawl.name" . }}-redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            if [ -n "$REDIS_PASSWORD" ]; then
              echo "Starting Redis with authentication"
              exec redis-server --bind 0.0.0.0 --requirepass "$REDIS_PASSWORD"
            else
              echo "Starting Redis without authentication"
              exec redis-server --bind 0.0.0.0
            fi
        env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "freecrawl.fullname" . }}-secret
                key: REDIS_PASSWORD
