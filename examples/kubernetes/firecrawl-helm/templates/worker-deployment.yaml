apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "freecrawl.fullname" . }}-worker
  labels:
    app: {{ include "freecrawl.name" . }}-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "freecrawl.name" . }}-worker
  template:
    metadata:
      labels:
        app: {{ include "freecrawl.name" . }}-worker
    spec:
      {{- if .Values.image.dockerSecretEnabled }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: [ "pnpm", "run", "workers" ]
          env:
            - name: FLY_PROCESS_GROUP
              value: "worker"
          envFrom:
            - configMapRef:
                name: {{ include "freecrawl.fullname" . }}-config
            - secretRef:
                name: {{ include "freecrawl.fullname" . }}-secret
